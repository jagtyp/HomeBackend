<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <META HTTP-EQUIV="refresh" CONTENT="900"> <!--900->
  <!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
  <title>Display sida</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1fgjWPGmkzs7" crossorigin="anonymous">

  <!-- Darkly theme -->
  <link href="//maxcdn.bootstrapcdn.com/bootswatch/3.3.6/darkly/bootstrap.min.css" rel="stylesheet" integrity="sha384-kVo/Eh0sv7ZdiwZK32nRsp1FrDT3sLRLx3zVpSSTI9UdO5H02LJNLBg5F1gwvKg0" crossorigin="anonymous">

  <!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
  <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
  <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->
</head>
<body>
  <div class="container" id="content" tabindex="-1" style="opacity : .6;">
    <a href="/">Charts</a>
    <div style="font-size:40px; padding-top: 10px; padding-bottom: 20px;">
      <span id="time"></span>
    </div>
    <div style="font-size:50px; padding-bottom: 30px;">
      Inne:
      <span id="inside"></span>
      <span id="insideTrend" class="glyphicon"></span>
    </div>
    <div style="font-size:50px;">
      Ute:
      <span id="outside"></span>
      <span id="outsideTrend" class="glyphicon"></span>
    </div>
    <div id="status" style="position : absolute; top : 50px; right : 50px;">
      <div class="burning" style="display : none;"><img src="img/fire.png" width="150" height="150"/></div>
      <div class="warning" style="display : none;"><img src="img/warning.png" width="150" height="150"/></div>
    </div>
    <div>
      <div style="float:left; width : 400px; height : 150px;">
        <canvas id="chart" width="400" height="200"></canvas>
      </div>
      <div style="float:right;">
        <canvas id="tankChart" width="100" height="150"></canvas>
      </div>
      <div style="float:right;">
        <div style="top:58px; left:50px; position:relative; height:0">
          <span id="shuntOut" ></span><br/>
          <span id="shuntIn"></span><br/><br/>
          <span id="shuntDiff"></span>
        </div>
        <canvas id="shuntChart" width="150" height="150"></canvas>
      </div>
    </div>
  </div>
  <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
  <script   src="//cdnjs.cloudflare.com/ajax/libs/jquery/2.2.2/jquery.min.js"   integrity="sha256-36cp2Co+/62rEAAYHLmRCPIych47CvdM+uTBJwSzWjI="   crossorigin="anonymous"></script>
  <!-- Include all compiled plugins (below), or include individual files as needed -->
  <script src="//maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js" integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS" crossorigin="anonymous"></script>
  <script type="text/javascript" src="//cdnjs.cloudflare.com/ajax/libs/Chart.js/2.1.6/Chart.bundle.min.js"></script>
<script src="//cdnjs.cloudflare.com/ajax/libs/moment.js/2.17.1/moment.min.js" integrity="sha256-Gn7MUQono8LUxTfRA0WZzJgTua52Udm1Ifrk5421zkA=" crossorigin="anonymous"></script>
  <script src="//cdnjs.cloudflare.com/ajax/libs/moment.js/2.17.1/locale/sv.js" integrity="sha256-aZaoxgvW1co/rTq6nZruQe6SPkilxZVWm6puRVHbFjs=" crossorigin="anonymous"></script>
  <script src="js/display.js"></script>
</body>
</html>
